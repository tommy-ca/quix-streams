# Historical Crypto Data Analysis Pipeline Template
#
# This template configures a Binance S3 source for historical crypto data replay
# connected to an Iceberg REST sink for lakehouse storage.
#
# Usage:
#   python -m quixstreams.templates.loader historical-analysis.yaml
#
# Environment Variables:
#   KAFKA_BOOTSTRAP_SERVERS: Kafka cluster address (default: localhost:9092)
#   ICEBERG_CATALOG_URI: Iceberg REST catalog endpoint (default: http://localhost:8181)
#   ICEBERG_TABLE_NAME: Target table name (default: crypto.historical_trades)
#   AWS_ACCESS_KEY_ID: AWS access key for S3 (optional for public data)
#   AWS_SECRET_ACCESS_KEY: AWS secret key for S3 (optional for public data)

# Kafka Configuration
kafka:
  bootstrap_servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
  auto_offset_reset: "earliest"

# QuixStreams Application Configuration
application:
  app_id: "crypto-historical-analysis"

# Crypto Source Configuration
crypto_source:
  type: "binance_s3"
  config:
    bucket: "binance-public-data"
    prefix_template: "data/spot/daily/trades/{symbol}/"
    data_type: "trades"
    symbols: ["BTCUSDT", "ETHUSDT"]
    date_from: "2024-01-01"
    date_to: "2024-01-31"
    # Replay configuration
    replay_speed: 1.0  # 1.0 = real-time, 0.0 = as fast as possible
    enable_checksum: true
    # Optional: AWS credentials for private buckets
    # auth_provider:
    #   type: "aws"
    #   access_key: "${AWS_ACCESS_KEY_ID}"
    #   secret_key: "${AWS_SECRET_ACCESS_KEY}"
    #   region: "us-east-1"

# Iceberg REST Sink Configuration  
iceberg_sink:
  catalog_uri: "${ICEBERG_CATALOG_URI:http://localhost:8181}"
  table_name: "${ICEBERG_TABLE_NAME:crypto.historical_trades}"
  storage:
    endpoint: "http://localhost:9000"  # MinIO for local development
    bucket: "lakehouse"
    prefix: "crypto/historical/"
    credentials:
      access_key: "${S3_ACCESS_KEY:minioadmin}"
      secret_key: "${S3_SECRET_KEY:minioadmin}"

# Topic Configuration
topics:
  crypto_historical:
    name: "crypto.historical"
    partitions: 6  # Higher partitions for historical data throughput
    replication_factor: 1

# Data Flow Configuration
pipeline:
  source_topic: "crypto.historical"
  sink_topic: "crypto.historical"
  # Historical data specific transformations
  transformations:
    - normalize_schema: true
    - add_processing_timestamp: true
    - partition_by_date: true  # Partition by event date for efficient queries