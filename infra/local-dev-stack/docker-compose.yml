version: '3.8'

services:
  # Redpanda - Kafka-compatible streaming platform
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.3
    container_name: quix-redpanda
    command:
      - redpanda
      - start
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
    ports:
      - "18081:8081"   # Schema Registry
      - "18082:8082"   # Pandaproxy (REST API)
      - "19092:9092"   # Kafka API (external)
      - "19644:9644"   # Admin API
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - lakehouse

  # MinIO - S3-compatible object storage
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: quix-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - lakehouse

  # Create MinIO buckets on startup
  minio-setup:
    image: minio/mc:RELEASE.2024-01-13T05-33-17Z
    container_name: quix-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb minio/crypto-dev --ignore-existing;
      /usr/bin/mc mb minio/lakehouse --ignore-existing;
      /usr/bin/mc policy set public minio/crypto-dev;
      /usr/bin/mc policy set public minio/lakehouse;
      exit 0;
      "
    networks:
      - lakehouse

  # PostgreSQL - Database for Lakekeeper catalog
  postgres:
    image: postgres:15
    container_name: quix-postgres
    environment:
      POSTGRES_DB: lakekeeper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lakekeeper"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse

  # Lakekeeper - REST Catalog for Iceberg
  lakekeeper:
    image: quay.io/lakekeeper/catalog:latest-main
    container_name: quix-lakekeeper
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: "This-is-NOT-Secure-Change-In-Production!"
      LAKEKEEPER__PG_DATABASE_URL_READ: "postgresql://postgres:postgres@postgres:5432/lakekeeper"
      LAKEKEEPER__PG_DATABASE_URL_WRITE: "postgresql://postgres:postgres@postgres:5432/lakekeeper"
      RUST_LOG: "info,lakekeeper=debug"
    ports:
      - "8181:8181"   # REST Catalog API
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/management/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - lakehouse

  # Bootstrap Lakekeeper
  lakekeeper-bootstrap:
    image: curlimages/curl:latest
    container_name: quix-lakekeeper-bootstrap
    depends_on:
      lakekeeper:
        condition: service_healthy
    command: >
      sh -c "
      echo 'Bootstrapping Lakekeeper...';
      curl -w '%{http_code}' -X POST 'http://lakekeeper:8181/management/v1/bootstrap' \
        -H 'Content-Type: application/json' \
        -d '{\"accept-terms-of-use\": true}' \
        -o /dev/null;
      echo '';
      echo 'Creating warehouse...';
      curl -w '%{http_code}' -X POST 'http://lakekeeper:8181/management/v1/warehouse' \
        -H 'Content-Type: application/json' \
        -d '{
          \"warehouse-name\": \"local\",
          \"project-id\": \"00000000-0000-0000-0000-000000000000\",
          \"storage-profile\": {
            \"type\": \"s3\",
            \"bucket\": \"lakehouse\",
            \"key-prefix\": \"warehouse/\",
            \"assume-role-arn\": null,
            \"endpoint\": \"http://minio:9000\",
            \"region\": \"us-east-1\",
            \"path-style-access\": true,
            \"sts-enabled\": false
          },
          \"storage-credential\": {
            \"type\": \"s3\",
            \"credential-type\": \"access-key\",
            \"aws-access-key-id\": \"minioadmin\",
            \"aws-secret-access-key\": \"minioadmin\"
          }
        }' \
        -o /dev/null;
      echo '';
      echo 'Bootstrap complete!';
      "
    networks:
      - lakehouse

  # Redpanda Console - Web UI for Kafka
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.3
    container_name: quix-redpanda-console
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./console-config.yml:/tmp/config.yml
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - lakehouse

volumes:
  minio_data:
    driver: local
  postgres_data:
    driver: local

networks:
  lakehouse:
    driver: bridge